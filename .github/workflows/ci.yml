name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mxvoice-download .

      - name: Start container
        run: docker run -d --name test -p 3000:3000 mxvoice-download

      - name: Wait for server
        run: sleep 2

      - name: Test /download/dmg returns 302
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/download/dmg)
          echo "Status: $status"
          [ "$status" = "302" ]

      - name: Test /download/exe returns 302
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/download/exe)
          echo "Status: $status"
          [ "$status" = "302" ]

      - name: Test unknown path returns 404
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/something)
          echo "Status: $status"
          [ "$status" = "404" ]

      - name: Stop container
        if: always()
        run: docker stop test
